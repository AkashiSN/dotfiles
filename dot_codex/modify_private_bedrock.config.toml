#!/usr/bin/env bash
# chezmoi modify_ スクリプト: ~/.codex/bedrock.config.toml
#
# このファイルは codex CLI が実行時に書き換える:
#   - [projects."<path>"]          : ディレクトリの trust_level
#   - [tui.model_availability_nux] : TUI の表示状態
# その他にも codex が新規セクションを追記しうる。
#
# そのため「ファイル全体を chezmoi 管理」にすると、codex が追記するたびに
# ドリフトが出る。ここでは aws/modify_config と同じ方針で、
# 「自分が管理する初期設定だけを enforce し、それ以外(codex の実行時追記)は
# 一切削除せず素通しする」マージを行う。
#
# 管理対象: ルートの model / model_provider と [model_providers.amazon-bedrock.aws]。
# トレードオフ: codex の追記セクション(projects/tui 等)は実機から自動削除されない。
set -euo pipefail

# --- 管理する初期設定(正規値) ---
cat <<'EOF'
# Codex on Amazon Bedrock 用プロファイル。
# `codex --profile bedrock` (= -p bedrock) で base の ~/.codex/config.toml に
# この内容がレイヤされる。config.toml 本体には手を入れないため、codex が
# 実行時に書き換える trust_level / tui 状態などと競合しない。
#
# 認証は標準の AWS クレデンシャルチェーン（環境変数 / プロファイル）から解決される。
# aws-switch 等でプロファイルを使う場合は AWS_PROFILE を設定して codex を起動する。
#
# 注意 (2026-06 時点): モデルは us-east-2(オハイオ) のみ提供。us-east-1 は 404。
# AWS セッション切れ時は OpenAI に黙ってフォールバックし課金されうるので、
# TUI のモデル表示が openai.gpt-5.5 であることを確認すること。
model = "openai.gpt-5.4" # gpt5.5が重すぎるため一旦gpt5.4にする
model_provider = "amazon-bedrock"

[model_providers.amazon-bedrock]
[model_providers.amazon-bedrock.aws]
region = "us-east-2"
EOF

# --- 現状ファイル(stdin)から管理対象外セクションだけを取り出して追記 ---
# ルートの管理キーと [model_providers.amazon-bedrock.aws] は上の正規値で
# 出力済みなので捨て、それ以外のセクション(codex の実行時追記)は保持する。
awk '
/^[[:space:]]*\[/ {
    hdr = $0
    sub(/^[[:space:]]*\[[[:space:]]*/, "", hdr)
    sub(/[[:space:]]*\].*/, "", hdr)
    if (hdr == "model_providers.amazon-bedrock") { keep = 0; next }
    keep = 1
    print ""
    print
    next
}
keep && NF { print }
'
