# chezmoi create_ 属性: ~/.codex/config.toml が存在しない時だけ作成する。
# 一度ホームに展開された後は chezmoi はこのファイルを管理しない（apply で上書き
# しない）。codex CLI が実行時に config.toml へ projects/tui などを追記しても
# ドリフトにならない。初期値だけを撒くのが目的。
#
# 既定はサブスク(OpenAI ログイン / auth.json)。model_provider を指定しないことで
# codex 既定の openai provider になる。Bedrock は codex-bedrock / ide-bedrock が
# `--profile bedrock`(~/.codex/bedrock.config.toml)で明示的に被せる。
model = "openai.gpt-5.5"
