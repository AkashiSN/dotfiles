# shpool config — ~/.config/shpool/config.toml
# shpool daemon がロードする(autodaemonize で最初の `shpool attach` 時に fork)。デーモンは
# このファイルを inotify/FSEvents で監視しており、変更は次回の attach から自動反映される
# (万一効かない場合は `pkill -f shpool` でデーモンごと畳んでから再 attach する)。
# 用途は ide()(dot_config/zsh/rc.d/50-functions.zsh)の SSH 切断耐性ラッパー。

# 再アタッチ時に vt100 バッファから画面を復元する(既定値だが意図を固定)。この画面復元だけでは
# 別サイズ reattach 時のサイズ追従とマウス有効化までは揃わないので、ide()(再アタッチ時に nvim へ
# SIGUSR1)→ nvim の :Resync(in-band resize=mode 2048 の再アーム + マウス再送)で補う。
session_restore_mode = "simple"

# 新規セッション作成時に、`shpool attach` を叩いた対話シェルの env からここに挙げた変数だけを
# 引き継ぐ(再アタッチ時は無効)。ide-bedrock が export する Bedrock/AWS 用 env を nvim とその子
# `claude` へ伝播させるため(デーモン起動のセッションは client の env を継がず、zshrc でも作られない
# ので転送が必要)。通常の ide では未設定なので何も引き継がれず影響しない。
# PATH や AQUA_* は ide() が `zsh -ic` 経由で起動して zshenv+zshrc から対話シェルと同一に整えるので
# ここでの転送は不要(NVIM_IDE も --cmd の `env NVIM_IDE=1` で直接渡すため不要)。
forward_env = [
  "SSH_CLIENT",
  "SSH_CONNECTION",
  "LC_PORTFWD_HOST",
  "CLAUDE_CODE_USE_BEDROCK",
  "CLAUDE_CODE_USE_MANTLE",
  "CLAUDE_CODE_ENABLE_AUTO_MODE",
  "ANTHROPIC_MODEL",
  "ANTHROPIC_DEFAULT_OPUS_MODEL",
  "ANTHROPIC_DEFAULT_SONNET_MODEL",
  "ANTHROPIC_DEFAULT_HAIKU_MODEL",
  "AWS_REGION",
  "AWS_PROFILE",
  "AWS_ACCESS_KEY_ID",
  "AWS_SECRET_ACCESS_KEY",
  "AWS_SESSION_TOKEN",
]
