# starship prompt — https://starship.rs/config/
# Nerd Font required (same as the previous p10k setup).
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$golang\
$nodejs\
$terraform\
$aws\
$kubernetes\
$cmd_duration\
$line_break\
$status$character"""

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

[status]
disabled = false
format = "[✘ $status]($style) "
style = "bold red"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold cyan"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold green"

[terraform]
symbol = "󱁢 "
format = "[$symbol$workspace]($style) "
style = "bold 105"

[aws]
symbol = " "
format = "[$symbol($profile )(\\($region\\) )]($style)"
style = "bold yellow"

[kubernetes]
disabled = false
symbol = "☸ "
format = "[$symbol$context( \\($namespace\\))]($style) "
style = "bold blue"
