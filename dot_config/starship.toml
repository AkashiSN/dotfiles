# starship prompt — https://starship.rs/config/
# Nerd Font required.
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 1000

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$golang\
$nodejs\
$terraform\
$aws\
$kubernetes\
$cmd_duration\
$line_break\
$status$character"""

# SSH/root 時だけ user@host を出して、どのホストで作業中か一目で分かるようにする
[username]
show_always = false        # SSH または root のときだけ表示（ローカル通常時は何も出さない）
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style)@"

[hostname]
ssh_only = true            # SSH のときだけ表示
ssh_symbol = ""            # globe 絵文字を消して user@host をシンプルに
style = "bold green"
format = "[$hostname]($style) "

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

[status]
disabled = false
format = "[✘ $status]($style) "
style = "bold red"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold cyan"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold green"

[terraform]
symbol = "󱁢 "
format = "[$symbol$workspace]($style) "
style = "bold 105"

[aws]
symbol = " "
format = "[$symbol($profile )(\\($region\\) )]($style)"
style = "bold yellow"

[kubernetes]
disabled = false
symbol = "☸ "
format = "[$symbol$context( \\($namespace\\))]($style) "
style = "bold blue"
