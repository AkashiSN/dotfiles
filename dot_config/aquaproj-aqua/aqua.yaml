---
# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/aqua-yaml.json
# aqua - Declarative CLI Version Manager
# https://aquaproj.github.io/
checksum:
  enabled: true
  require_checksum: false
registries:
  - type: standard
    ref: v4.524.0 # renovate: depName=aquaproj/aqua-registry
  - name: local
    type: local
    path: registry.yaml
packages:
  # --- standard registry ---
  - name: x-motemen/ghq@v1.10.1
  - name: peco/peco@v0.6.0
  - name: tofuutils/tenv@v4.14.8
  - name: direnv/direnv@v2.37.1
  - name: astral-sh/uv@0.11.21
  - name: golang/go@go1.26.4
  - name: Schniz/fnm@v1.39.0
  # --- shell: plugin manager / prompt / fuzzy finder ---
  - name: rossmacarthur/sheldon@0.8.5
  - name: starship/starship@v1.25.1
  - name: junegunn/fzf@v0.73.1
  # --- editor: neovim + search backends (fzf-lua) ---
  - name: neovim/neovim@v0.12.3
  - name: BurntSushi/ripgrep@15.1.0
  - name: sharkdp/fd@v10.4.2
  # --- local registry (standard registry に無いもの) ---
  - name: yt-dlp/yt-dlp@2026.06.09
    registry: local
  - name: wez/atomicparsley@20221229.172126.d813aa6
