---
# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/aqua-yaml.json
# aqua - Declarative CLI Version Manager
# https://aquaproj.github.io/
checksum:
  enabled: true
  require_checksum: false
registries:
  - type: standard
    ref: v4.524.0 # renovate: depName=aquaproj/aqua-registry
  - name: local
    type: local
    path: registry.yaml
packages:
  # --- 言語ランタイム / バージョンマネージャ ---
  - name: golang/go@go1.26.4
  - name: denoland/deno@v2.8.3
  - name: Schniz/fnm@v1.39.0 # node version manager
  - name: astral-sh/uv@0.11.21 # python
  - name: rust-lang/rustup@1.29.0 # rust toolchain installer (cargo は rustup default stable で導入)
  - name: tofuutils/tenv@v4.14.8 # terraform / opentofu
  # --- git / リポジトリ ---
  - name: cli/cli@v2.94.0 # gh
    # 初回(クリーン環境)は attestation 検証に必要な gh 認証がまだ無いため、
    # この bootstrap タグだけ先に検証なしで入れてから gh auth login する。
    tags:
      - bootstrap
  - name: x-motemen/ghq@v1.10.1
  # --- shell: plugin manager / prompt / env / fuzzy finder ---
  - name: rossmacarthur/sheldon@0.8.5 # zsh plugin manager
  - name: starship/starship@v1.25.1 # prompt
  - name: direnv/direnv@v2.37.1
  - name: junegunn/fzf@v0.73.1
  - name: peco/peco@v0.6.0
  # --- editor: neovim + 検索バックエンド (fzf-lua) ---
  - name: neovim/neovim@v0.12.3
  - name: BurntSushi/ripgrep@15.1.0
  - name: sharkdp/fd@v10.4.2
  # treesitter パーサーのビルドに必要 (tree-sitter-manager.nvim)
  - name: tree-sitter/tree-sitter@v0.26.9
  # --- secrets ---
  - name: 1password/cli@v2.31.1 # op
  # --- cloud ---
  # macOS は .pkg 形式のため展開に unar が必要 (10-install-packages の brew で導入)
  - name: aws/aws-cli@2.35.6
  - name: kubernetes/kubernetes/kubectl@v1.36.2
  # --- network / data utilities ---
  - name: cloudflare/cloudflared@2026.6.0
  - name: jqlang/jq@jq-1.8.1
  - name: mikefarah/yq@v4.53.3
  # --- local registry (standard registry に無いもの) ---
  - name: yt-dlp/yt-dlp@2026.06.09 # media downloader
    registry: local
  - name: wez/atomicparsley@20221229.172126.d813aa6 # yt-dlp 用メタデータ書込
    registry: local
  - name: crates.io/shpool@0.11.0 # 軽量なシェルセッション永続化 (cargo build)
    registry: local
    tags:
      # cargo 必須。20-aqua-install(--exclude-tags rust)では入れず、
      # rust toolchain 導入後の 32-rust-default(aqua install -t rust)でビルドする。
      - rust
