---
# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/aqua-policy.json
# Allow the standard registry and the bundled local registry (registry.yaml).
registries:
  - type: standard
    ref: semver(">= 3.0.0")
  - name: local
    type: local
    path: registry.yaml
packages:
  - registry: standard
  - registry: local
